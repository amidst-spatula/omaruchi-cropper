<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>omaruchi-cropper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>omaruchi-cropper</h1>
            <p>おまるちのキャラ選択画面のスクリーンショットからキャラを抽出するよ</p>
        </header>

        <main>
            <section class="upload-section">
                <label for="imageInput" class="custom-file-upload">
                    画像を選択（複数可）
                </label>
                <input type="file" id="imageInput" accept="image/*" multiple>
                <button id="toggleAdjustBtn" class="secondary-btn" style="display: none;">位置調整を表示</button>
            </section>

            <section id="settingsPanel" class="settings-panel hidden">
                <div class="adjustment-mode-selector" style="margin-bottom: 10px; display: flex; gap: 15px; justify-content: center;">
                    <label style="cursor: pointer;">
                        <input type="radio" name="adjustMode" value="character" checked> キャラ枠調整
                    </label>
                    <label style="cursor: pointer;">
                        <input type="radio" name="adjustMode" value="name"> 名前解析枠調整
                    </label>
                </div>
                <div class="adjustment-preview-container">
                    <p style="margin-bottom: 5px;"><strong>位置調整のしかた</strong></p>
                    <ul style="text-align: left; font-size: 0.85rem; opacity: 0.8; margin-top: 0; margin-bottom: 15px; padding-left: 20px;">
                        <li><strong>キャラ枠調整 (青)</strong>: 画像の切り抜き位置がズレている場合に選択し、画像を上下にドラッグして青い枠をキャラに合わせてください。</li>
                        <li><strong>名前解析枠調整 (ピンク)</strong>: キャラが正しく並べ替え（ソート）されない場合に選択し、画像を上下にドラッグしてピンクの細い枠をプレイヤー名に合わせてください。</li>
                    </ul>
                    <div id="adjustmentWrapper" class="adjustment-wrapper">
                        <canvas id="adjustmentCanvas"></canvas>
                        <div id="cropOverlay" class="crop-overlay"></div>
                    </div>
                </div>
                <div class="setting-item" style="display: flex; gap: 10px; align-items: center;">
                    <button id="resetAdjustBtn" class="secondary-btn" style="margin-left: 0;">デフォルトにリセット</button>
                    <span style="font-size: 0.8rem; opacity: 0.7;">※設定は自動的に保存されます</span>
                </div>
                <!-- 内部的な値保持用（非表示） -->
                <input type="hidden" id="charYOffset" value="0">
                <input type="hidden" id="nameYOffset" value="0">
            </section>

            <section id="previewContainer" class="preview-container">
                <!-- 切り抜かれた画像がここに表示されます -->
            </section>
        </main>

        <footer>
            <p>画像をタップして保存できます</p>
            <p><a href="https://github.com/amidst-spatula/omaruchi-cropper/" target="_blank" rel="noopener noreferrer" style="color: var(--accent-color); text-decoration: none;">GitHub Repository (README)</a></p>
        </footer>

    </div>
    <script src="app.js"></script>
</body>
</html>
